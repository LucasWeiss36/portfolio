name: Deploy Portfolio

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Image
        run: docker build -t portfolio .
      
      - name: Deploy Container
        run: |
          docker stop portfolio || true
          docker rm portfolio || true
          docker run -d \
            --name portfolio \
            --network webnet \
            portfolio